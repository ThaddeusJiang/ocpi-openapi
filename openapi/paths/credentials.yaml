get:
  tags:
  - Credentials
  summary: Retrieve credentials
  operationId: getCredentials
  security:
  - tokenAuth: []
  responses:
    '200':
      $ref: ../components/responses/CredentialsResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
post:
  tags:
  - Credentials
  summary: Register credentials
  operationId: postCredentials
  security:
  - tokenAuth: []
  requestBody:
    $ref: ../components/requestBodies/Credentials.yaml
  responses:
    '200':
      $ref: ../components/responses/CredentialsResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '405':
      $ref: ../components/responses/MethodNotAllowed.yaml
put:
  tags:
  - Credentials
  summary: Update credentials
  operationId: putCredentials
  security:
  - tokenAuth: []
  requestBody:
    $ref: ../components/requestBodies/Credentials.yaml
  responses:
    '200':
      $ref: ../components/responses/CredentialsResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '405':
      $ref: ../components/responses/MethodNotAllowed.yaml
delete:
  tags:
  - Credentials
  summary: Invalidate credentials
  operationId: deleteCredentials
  security:
  - tokenAuth: []
  responses:
    '200':
      $ref: ../components/responses/Accepted.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '405':
      $ref: ../components/responses/MethodNotAllowed.yaml
