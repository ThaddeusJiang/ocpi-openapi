get:
  tags:
  - ChargingProfiles
  summary: Request the ActiveChargingProfile for a Session
  operationId: getActiveChargingProfile
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/sessionId.yaml
  - $ref: ../components/parameters/duration.yaml
  - $ref: ../components/parameters/responseUrl.yaml
  responses:
    '200':
      $ref: ../components/responses/ChargingProfileResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
  - ChargingProfiles
  summary: Set or update a ChargingProfile for a Session
  operationId: putChargingProfile
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/sessionId.yaml
  requestBody:
    $ref: ../components/requestBodies/SetChargingProfile.yaml
  responses:
    '200':
      $ref: ../components/responses/ChargingProfileResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
delete:
  tags:
  - ChargingProfiles
  summary: Clear a ChargingProfile for a Session
  operationId: deleteChargingProfile
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/sessionId.yaml
  - $ref: ../components/parameters/responseUrl.yaml
  responses:
    '200':
      $ref: ../components/responses/ChargingProfileResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
