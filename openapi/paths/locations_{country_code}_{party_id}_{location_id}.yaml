get:
  tags:
  - Locations
  summary: Retrieve pushed Location, EVSE or Connector
  operationId: getPushedLocationObject
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  - $ref: ../components/parameters/locationId.yaml
  responses:
    '200':
      $ref: ../components/responses/LocationObjectResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
  - Locations
  summary: Push new or updated Location, EVSE or Connector
  operationId: putLocationObject
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  - $ref: ../components/parameters/locationId.yaml
  requestBody:
    $ref: ../components/requestBodies/Location.yaml
  responses:
    '200':
      $ref: ../components/responses/LocationObjectResponse.yaml
    '201':
      $ref: ../components/responses/LocationObjectResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
patch:
  tags:
  - Locations
  summary: Partially update a Location, EVSE or Connector
  operationId: patchLocationObject
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  - $ref: ../components/parameters/locationId.yaml
  requestBody:
    $ref: ../components/requestBodies/LocationPatch.yaml
  responses:
    '200':
      $ref: ../components/responses/LocationObjectResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
