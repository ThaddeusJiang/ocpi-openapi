get:
  tags:
  - HubClientInfo
  summary: Retrieve a ClientInfo object
  operationId: getClientInfo
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  responses:
    '200':
      $ref: ../components/responses/ClientInfoResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
  - HubClientInfo
  summary: Push a new or updated ClientInfo object
  operationId: putClientInfo
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  requestBody:
    $ref: ../components/requestBodies/ClientInfo.yaml
  responses:
    '200':
      $ref: ../components/responses/ClientInfoResponse.yaml
    '201':
      $ref: ../components/responses/ClientInfoResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
