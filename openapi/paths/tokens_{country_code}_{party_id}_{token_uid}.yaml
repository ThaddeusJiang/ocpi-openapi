get:
  tags:
  - Tokens
  summary: Retrieve a Token
  operationId: getTokenById
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  - $ref: ../components/parameters/tokenUid.yaml
  - $ref: ../components/parameters/type.yaml
  responses:
    '200':
      $ref: ../components/responses/TokenResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
put:
  tags:
  - Tokens
  summary: Push a new or updated Token
  operationId: putToken
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  - $ref: ../components/parameters/tokenUid.yaml
  - $ref: ../components/parameters/type.yaml
  requestBody:
    $ref: ../components/requestBodies/Token.yaml
  responses:
    '200':
      $ref: ../components/responses/TokenResponse.yaml
    '201':
      $ref: ../components/responses/TokenResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
patch:
  tags:
  - Tokens
  summary: Partially update a Token
  operationId: patchToken
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/countryCode.yaml
  - $ref: ../components/parameters/partyId.yaml
  - $ref: ../components/parameters/tokenUid.yaml
  - $ref: ../components/parameters/type.yaml
  requestBody:
    $ref: ../components/requestBodies/TokenPatch.yaml
  responses:
    '200':
      $ref: ../components/responses/TokenResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
    '404':
      $ref: ../components/responses/NotFound.yaml
