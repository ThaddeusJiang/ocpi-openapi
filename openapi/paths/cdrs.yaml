get:
  tags:
  - CDRs
  summary: Fetch CDRs
  operationId: getCdrs
  security:
  - tokenAuth: []
  parameters:
  - $ref: ../components/parameters/collectionDateFrom.yaml
  - $ref: ../components/parameters/collectionDateTo.yaml
  - $ref: ../components/parameters/collectionOffset.yaml
  - $ref: ../components/parameters/collectionLimit.yaml
  responses:
    '200':
      $ref: ../components/responses/CdrsResponse.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
post:
  tags:
  - CDRs
  summary: Create a CDR
  operationId: createCdr
  security:
  - tokenAuth: []
  requestBody:
    $ref: ../components/requestBodies/Cdr.yaml
  responses:
    '201':
      $ref: ../components/responses/CdrResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
