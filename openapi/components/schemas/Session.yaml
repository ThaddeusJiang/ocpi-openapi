summary: Session schema
type: object
required:
- country_code
- party_id
- id
- start_date_time
- kwh
- cdr_token
- auth_method
- location_id
- evse_uid
- connector_id
- currency
- status
- last_updated
properties:
  country_code:
    $ref: ./CountryCode.yaml
  party_id:
    $ref: ./PartyID.yaml
  id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  start_date_time:
    $ref: ./DateTime.yaml
  end_date_time:
    $ref: ./DateTime.yaml
  kwh:
    $ref: ./number.yaml
  cdr_token:
    $ref: ./CdrToken.yaml
  auth_method:
    $ref: ./AuthMethod.yaml
  authorization_reference:
    type: string
    maxLength: 36
    description: Case insensitive string.
  location_id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  evse_uid:
    type: string
    maxLength: 36
    description: Case insensitive string.
  connector_id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  meter_id:
    type: string
    maxLength: 255
  currency:
    type: string
    maxLength: 3
  charging_periods:
    type: array
    items:
      $ref: ./ChargingPeriod.yaml
  total_cost:
    $ref: ./Price.yaml
  status:
    $ref: ./SessionStatus.yaml
  last_updated:
    $ref: ./DateTime.yaml
