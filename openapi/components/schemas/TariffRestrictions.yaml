  end_date:
    $ref: ./day.yaml
  min_kwh:
    $ref: ./number.yaml
  max_kwh:
    $ref: ./number.yaml
  min_current:
    $ref: ./number.yaml
  max_current:
    $ref: ./number.yaml
  min_power:
    $ref: ./number.yaml
  max_power:
