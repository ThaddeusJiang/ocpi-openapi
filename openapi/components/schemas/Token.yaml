summary: Token schema
type: object
required:
- country_code
- party_id
- uid
- type
- contract_id
- issuer
- valid
- whitelist
- last_updated
properties:
  country_code:
    $ref: ./CountryCode.yaml
  party_id:
    $ref: ./PartyID.yaml
  uid:
    type: string
    maxLength: 36
    description: Case insensitive string.
  type:
    $ref: ./TokenType.yaml
  contract_id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  visual_number:
    type: string
    maxLength: 64
  issuer:
    type: string
    maxLength: 64
  group_id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  valid:
    type: boolean
  whitelist:
    $ref: ./WhitelistType.yaml
  language:
    type: string
    maxLength: 2
  default_profile_type:
    $ref: ./ProfileType.yaml
  energy_contract:
    $ref: ./EnergyContract.yaml
  last_updated:
    $ref: ./DateTime.yaml
