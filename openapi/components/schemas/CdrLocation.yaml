summary: CdrLocation schema
type: object
required:
- id
- address
- city
- country
- coordinates
- evse_uid
- evse_id
- connector_id
- connector_standard
- connector_format
- connector_power_type
properties:
  id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  name:
    type: string
    maxLength: 255
  address:
    type: string
    maxLength: 45
  city:
    type: string
    maxLength: 45
  postal_code:
    type: string
    maxLength: 10
  state:
    type: string
    maxLength: 20
  country:
    type: string
    maxLength: 3
  coordinates:
    $ref: ./GeoLocation.yaml
  evse_uid:
    type: string
    maxLength: 36
    description: Case insensitive string.
  evse_id:
    type: string
    maxLength: 48
    description: Case insensitive string.
  connector_id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  connector_standard:
    $ref: ./ConnectorType.yaml
  connector_format:
    $ref: ./ConnectorFormat.yaml
  connector_power_type:
    $ref: ./PowerType.yaml
