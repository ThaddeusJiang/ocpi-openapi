summary: EVSE schema
type: object
required:
- uid
- status
- last_updated
properties:
  uid:
    type: string
    maxLength: 36
    description: Case insensitive string.
  evse_id:
    type: string
    maxLength: 48
    description: Case insensitive string.
  status:
    $ref: ./Status.yaml
  status_schedule:
    type: array
    items:
      $ref: ./StatusSchedule.yaml
  capabilities:
    type: array
    items:
      $ref: ./Capability.yaml
  connectors:
    $ref: ./Connector.yaml
  floor_level:
    type: string
    maxLength: 4
  coordinates:
    $ref: ./GeoLocation.yaml
  physical_reference:
    type: string
    maxLength: 16
  directions:
    type: array
    items:
      $ref: ./DisplayText.yaml
  parking_restrictions:
    type: array
    items:
      $ref: ./ParkingRestriction.yaml
  images:
    type: array
    items:
      $ref: ./Image.yaml
  last_updated:
    $ref: ./DateTime.yaml
