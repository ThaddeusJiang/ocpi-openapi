summary: Tariff schema
type: object
required:
- country_code
- party_id
- id
- currency
- last_updated
properties:
  country_code:
    $ref: ./CountryCode.yaml
  party_id:
    $ref: ./PartyID.yaml
  id:
    type: string
    maxLength: 36
    description: Case insensitive string.
  currency:
    type: string
    maxLength: 3
  type:
    $ref: ./TariffType.yaml
  tariff_alt_text:
    type: array
    items:
      $ref: ./DisplayText.yaml
  tariff_alt_url:
    $ref: ./URL.yaml
  min_price:
    $ref: ./Price.yaml
  max_price:
    $ref: ./Price.yaml
  elements:
    $ref: ./TariffElement.yaml
  start_date_time:
    $ref: ./DateTime.yaml
  end_date_time:
    $ref: ./DateTime.yaml
  energy_mix:
    $ref: ./EnergyMix.yaml
  last_updated:
    $ref: ./DateTime.yaml
