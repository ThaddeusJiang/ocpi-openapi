summary: Image schema
type: object
required:
- url
- category
- type
properties:
  url:
    $ref: ./URL.yaml
  thumbnail:
    $ref: ./URL.yaml
  category:
    $ref: ./ImageCategory.yaml
  type:
    type: string
    maxLength: 4
    description: Case insensitive string.
  width:
    type: string
    maxLength: 5
    maximum: 99999
  height:
    type: string
    maxLength: 5
    maximum: 99999
