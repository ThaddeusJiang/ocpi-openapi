name: Test Package
run-name: Test Package for ${{ github.ref_name }}

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test OpenAPI and generated client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test OpenAPI definition and generated TypeScript client
        run: npm test

      - name: Verify npm package can be packed
        run: npm run pack:check

      - name: Test packed package in TypeScript, CommonJS, and ESM consumers
        run: npm run test:regression:pack

      - name: Verify generated SDK, API reference, and coverage badge are committed
        run: |
          if [ -n "$(git status --porcelain -- src/generated api.md docs/coverage.svg)" ]; then
            git status --short -- src/generated api.md docs/coverage.svg
            git diff -- src/generated api.md docs/coverage.svg
            exit 1
          fi
