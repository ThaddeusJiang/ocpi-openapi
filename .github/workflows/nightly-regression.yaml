name: Nightly npm regression
run-name: Nightly npm regression for ${{ github.event.inputs.package || 'current checkout package' }}

on:
  schedule:
    # 03:00 Asia/Tokyo is 18:00 UTC on the previous day.
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: Optional published npm package spec to install and test
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  regression:
    name: Test npm package ${{ github.event.inputs.package || 'current checkout package' }}
    runs-on: ubuntu-latest
    env:
      OCPI_REGRESSION_PACKAGE: ${{ github.event.inputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test current checkout package from npm install
        if: ${{ env.OCPI_REGRESSION_PACKAGE == '' }}
        run: npm run test:regression:pack

      - name: Test ${{ github.event.inputs.package }} from npm install
        if: ${{ env.OCPI_REGRESSION_PACKAGE != '' }}
        run: npm run test:regression:npm
