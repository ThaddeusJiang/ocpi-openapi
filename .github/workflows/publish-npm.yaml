name: Publish generated client to npm
run-name: Publish @thaddeusjiang/ocpi from ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v2.2.1-d2
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @thaddeusjiang/ocpi from ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
    steps:
      - name: Checkout ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

      - name: Setup Node.js for npm publish from ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install npm 12.0.1 for trusted publishing
        run: npm install -g npm@12.0.1

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          release_version="${RELEASE_TAG#v}"

          if [ "$package_name" != "@thaddeusjiang/ocpi" ]; then
            echo "Unexpected package name: $package_name"
            exit 1
          fi

          if [ "$release_version" != "$package_version" ]; then
            echo "Release tag ($RELEASE_TAG) does not match package.json version ($package_version)"
            exit 1
          fi

      - name: Test generated client for ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: npm test

      - name: Verify npm package contents for ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: npm run pack:check

      - name: Publish @thaddeusjiang/ocpi to npm with next tag for ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
        run: npm publish --access public --provenance --tag next
