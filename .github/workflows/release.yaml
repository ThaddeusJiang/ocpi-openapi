name: Release npm packages
run-name: Release npm packages from ${{ github.ref_name }}

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish-dts:
    name: Publish OpenAPI packages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies and build packages
        run: |
          npm ci
          npm run build
          cp ./openapi/base.package.json ./dist/yaml/package.json
          cp ./openapi/base.package.json ./dist/dts/package.json

      - name: Read package version
        run: node -e "console.log('__OAS_VERSION=' + require('./package.json').version)" >> "$GITHUB_ENV"

      - name: Resolve npm publish options
        id: npm-publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          node <<'NODE' >> "$GITHUB_OUTPUT"
          const version = require('./package.json').version;
          const publishArgs = version.includes('-') ? '--tag next --access public' : '--access public';
          console.log('should_publish=true');
          console.log(`publish_args=${publishArgs}`);
          NODE

      - name: Create package.json for yaml package
        env:
          __PACKAGE_NAME: '@plugoinc/ocpi-openapi-yaml'
          __MAIN_FILE: openapi.yaml
        working-directory: ./dist/yaml
        run: |
          jq --arg NAME "$__PACKAGE_NAME" '.name = $NAME' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg VERSION "$__OAS_VERSION" '.version = $VERSION' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg MAIN "$__MAIN_FILE" '.main = $MAIN' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Create package.json for dts package
        env:
          __PACKAGE_NAME: '@plugoinc/ocpi-openapi-dts'
          __MAIN_FILE: schema.d.ts
        working-directory: ./dist/dts
        run: |
          jq --arg NAME "$__PACKAGE_NAME" '.name = $NAME' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg VERSION "$__OAS_VERSION" '.version = $VERSION' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg MAIN "$__MAIN_FILE" '.main = $MAIN' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Publish yaml package to npmjs
        if: steps.npm-publish.outputs.should_publish == 'true'
        run: npm publish ${{ steps.npm-publish.outputs.publish_args }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ./dist/yaml

      - name: Publish dts package to npmjs
        if: steps.npm-publish.outputs.should_publish == 'true'
        run: npm publish ${{ steps.npm-publish.outputs.publish_args }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ./dist/dts
