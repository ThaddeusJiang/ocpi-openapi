<svg xmlns="http://www.w3.org/2000/svg" width="130" height="20" role="img" aria-label="coverage: 100%">
  <title>coverage: 100%</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="130" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="72" height="20" fill="#555"/>
    <rect x="72" width="58" height="20" fill="#2ea043"/>
    <rect width="130" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="36" y="15" fill="#010101" fill-opacity=".3">coverage</text>
    <text x="36" y="14">coverage</text>
    <text x="101" y="15" fill="#010101" fill-opacity=".3">100%</text>
